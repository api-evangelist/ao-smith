name: AO Smith
description: >-
  A. O. Smith Corporation is a global manufacturer of residential and commercial
  water heaters, boilers, and water treatment products. AO Smith offers
  connected water heater products with IoT capabilities through its iCOMM
  connected technology platform, enabling remote monitoring and control of water
  heating systems via mobile app and third-party integrations.
