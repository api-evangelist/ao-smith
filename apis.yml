apis:
  - name: AO Smith iCOMM Connected Technology
    description: >-
      AO Smith's iCOMM connected technology platform enables remote monitoring
      and control of compatible AO Smith water heaters through the A. O. Smith
      mobile app. Provides connectivity for tracking water usage, setting
      temperature, enabling vacation mode, and receiving maintenance alerts.
      Third-party integrations are available for home automation platforms.
